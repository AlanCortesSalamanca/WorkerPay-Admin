<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de adelanto | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Detalle de adelanto'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro">
            <div>
                <p class="section-kicker">Adelantos</p>
                <h2 th:text="${advance.worker.fullName}">Trabajador</h2>
            </div>
            <a class="button button-secondary" th:href="@{/advances}">Volver</a>
        </section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger alert-dismissible" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="detail-panel">
            <div class="worker-summary">
                <span class="worker-avatar" th:text="${#strings.substring(advance.worker.fullName,0,1)}">T</span>
                <div>
                    <h3 th:text="${advance.worker.fullName}">Nombre</h3>
                    <p th:text="${advance.worker.position}">Puesto</p>
                </div>
                <span class="status-pill" th:classappend="${' advance-' + advance.status}" th:text="${advance.status.name() == 'PENDING' ? 'Pendiente' : (advance.status.name() == 'DISCOUNTED' ? 'Descontado' : 'Cancelado')}">Pendiente</span>
            </div>
            <dl class="detail-grid">
                <div><dt>Trabajador</dt><dd th:text="${advance.worker.fullName}">Trabajador</dd></div>
                <div><dt>Puesto</dt><dd th:text="${advance.worker.position}">Puesto</dd></div>
                <div><dt>Monto</dt><dd th:text="${'$' + #numbers.formatDecimal(advance.amount, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Fecha</dt><dd th:text="${advance.date}">2026-01-01</dd></div>
                <div><dt>Motivo</dt><dd th:text="${advance.reason} ?: 'Sin motivo'">Motivo</dd></div>
                <div><dt>Estado</dt><dd th:text="${advance.status.name() == 'PENDING' ? 'Pendiente' : (advance.status.name() == 'DISCOUNTED' ? 'Descontado' : 'Cancelado')}">Pendiente</dd></div>
                <div><dt>Fecha de creacion</dt><dd th:text="${#temporals.format(advance.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</dd></div>
                <div><dt>Ultima actualizacion</dt><dd th:text="${#temporals.format(advance.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</dd></div>
            </dl>
            <div class="form-actions" th:if="${advance.status.name() == 'PENDING'}">
                <a class="button button-secondary" th:href="@{/advances/{id}/edit(id=${advance.id})}">Editar</a>
                <form th:action="@{/advances/{id}/cancel(id=${advance.id})}" method="post" data-advance-confirm="cancelar">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="button button-warning">Cancelar</button>
                </form>
                <form th:action="@{/advances/{id}/mark-discounted(id=${advance.id})}" method="post" data-advance-confirm="marcar como descontado">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="button button-primary">Marcar como descontado</button>
                </form>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/advances.js}"></script>
</body>
</html>

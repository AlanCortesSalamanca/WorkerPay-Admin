<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' | WorkerPay Admin'">Adelanto | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle=${formTitle}" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro">
            <div>
                <p class="section-kicker">Adelantos</p>
                <h2 th:text="${formTitle}">Formulario</h2>
            </div>
        </section>
        <div class="alert alert-danger" th:if="${#lists.isEmpty(workers)}">Primero debes crear o activar un trabajador para registrar adelantos.</div>
        <form th:action="@{${formAction}}" th:object="${advanceForm}" method="post" class="form-panel">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-grid">
                <div class="form-group">
                    <label for="workerId">Trabajador</label>
                    <select id="workerId" th:field="*{workerId}">
                        <option value="">Selecciona un trabajador</option>
                        <option th:each="worker : ${workers}" th:value="${worker.id}" th:text="${worker.fullName + ' - ' + worker.position}">Trabajador</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('workerId')}" th:errors="*{workerId}"></span>
                </div>
                <div class="form-group">
                    <label for="amount">Monto</label>
                    <input id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}">
                    <span class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span>
                </div>
                <div class="form-group">
                    <label for="date">Fecha</label>
                    <input id="date" type="date" th:field="*{date}">
                    <span class="field-error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></span>
                </div>
                <div class="form-group form-group-wide">
                    <label for="reason">Motivo</label>
                    <textarea id="reason" rows="4" th:field="*{reason}"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></span>
                </div>
            </div>
            <div class="form-actions">
                <a class="button button-secondary" th:href="@{/advances}">Cancelar</a>
                <button type="submit" class="button button-primary" th:disabled="${#lists.isEmpty(workers)}">Guardar</button>
            </div>
        </form>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/advances.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adelantos | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/tables.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Adelantos'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro">
            <div>
                <p class="section-kicker">Control de adelantos</p>
                <h2>Adelantos registrados</h2>
            </div>
            <a class="button button-primary" th:href="@{/advances/new}">Nuevo adelanto</a>
        </section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger alert-dismissible" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="table-panel">
            <table>
                <thead>
                <tr>
                    <th>Trabajador</th>
                    <th>Monto</th>
                    <th>Fecha</th>
                    <th>Motivo</th>
                    <th>Estado</th>
                    <th>Registro</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(advances)}">
                    <td colspan="7" class="empty-cell">No hay adelantos registrados.</td>
                </tr>
                <tr th:each="advance : ${advances}">
                    <td>
                        <strong th:text="${advance.worker.fullName}">Trabajador</strong>
                        <span class="table-subtext" th:text="${advance.worker.position}">Puesto</span>
                    </td>
                    <td th:text="${'$' + #numbers.formatDecimal(advance.amount, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${advance.date}">2026-01-01</td>
                    <td th:text="${advance.reason} ?: 'Sin motivo'">Motivo</td>
                    <td>
                        <span class="status-pill" th:classappend="${' advance-' + advance.status}" th:text="${advance.status.name() == 'PENDING' ? 'Pendiente' : (advance.status.name() == 'DISCOUNTED' ? 'Descontado' : 'Cancelado')}">Pendiente</span>
                    </td>
                    <td th:text="${#temporals.format(advance.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                    <td class="actions-cell">
                        <a class="button button-secondary" th:href="@{/advances/{id}(id=${advance.id})}">Ver</a>
                        <a class="button button-secondary" th:if="${advance.status.name() == 'PENDING'}" th:href="@{/advances/{id}/edit(id=${advance.id})}">Editar</a>
                        <form th:if="${advance.status.name() == 'PENDING'}" th:action="@{/advances/{id}/cancel(id=${advance.id})}" method="post" data-advance-confirm="cancelar">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-warning">Cancelar</button>
                        </form>
                        <form th:if="${advance.status.name() == 'PENDING'}" th:action="@{/advances/{id}/mark-discounted(id=${advance.id})}" method="post" data-advance-confirm="marcar como descontado">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-primary">Descontado</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/advances.js}"></script>
</body>
</html>

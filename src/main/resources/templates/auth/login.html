<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel">
        <div class="login-brand">
            <span class="brand-mark">WP</span>
            <div>
                <h1>WorkerPay Admin</h1>
                <p>Sistema de administracion de pagos a trabajadores</p>
            </div>
        </div>
        <div class="login-heading">
            <h2>Iniciar sesion</h2>
            <p>Accede al panel administrativo interno.</p>
        </div>

        <div class="alert alert-danger" th:if="${param.error}">Usuario o contrasena incorrectos.</div>
        <div class="alert alert-success" th:if="${param.logout}">Sesion cerrada correctamente.</div>

        <form th:action="@{/login}" method="post" class="form-stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contrasena</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="button button-primary button-full">Entrar</button>
        </form>
    </section>
</main>
</body>
</html>

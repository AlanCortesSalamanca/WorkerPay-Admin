<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' | WorkerPay Admin'">Deuda | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle=${formTitle}" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro"><div><p class="section-kicker">Deudas</p><h2 th:text="${formTitle}">Formulario</h2></div></section>
        <div class="alert alert-danger" th:if="${#lists.isEmpty(workers)}">Primero debes crear o activar un trabajador para registrar deudas.</div>
        <form th:action="@{${formAction}}" th:object="${debtForm}" method="post" class="form-panel">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}"></div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="workerId">Trabajador</label>
                    <select id="workerId" th:field="*{workerId}">
                        <option value="">Selecciona un trabajador</option>
                        <option th:each="worker : ${workers}" th:value="${worker.id}" th:text="${worker.fullName + ' - ' + worker.position}">Trabajador</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('workerId')}" th:errors="*{workerId}"></span>
                </div>
                <div class="form-group">
                    <label for="originalAmount">Monto original</label>
                    <input id="originalAmount" type="number" step="0.01" min="0.01" th:field="*{originalAmount}">
                    <span class="field-error" th:if="${#fields.hasErrors('originalAmount')}" th:errors="*{originalAmount}"></span>
                </div>
                <div class="form-group">
                    <label for="suggestedPayment">Abono sugerido</label>
                    <input id="suggestedPayment" type="number" step="0.01" min="0" th:field="*{suggestedPayment}">
                    <span class="field-error" th:if="${#fields.hasErrors('suggestedPayment')}" th:errors="*{suggestedPayment}"></span>
                </div>
                <div class="form-group form-group-wide">
                    <label for="description">Descripcion</label>
                    <textarea id="description" rows="4" th:field="*{description}"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>
            </div>
            <div class="form-actions">
                <a class="button button-secondary" th:href="@{/debts}">Cancelar</a>
                <button type="submit" class="button button-primary" th:disabled="${#lists.isEmpty(workers)}">Guardar</button>
            </div>
        </form>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/debts.js}"></script>
</body>
</html>

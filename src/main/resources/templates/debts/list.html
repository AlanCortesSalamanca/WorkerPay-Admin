<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deudas | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/tables.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Deudas'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro">
            <div>
                <p class="section-kicker">Prestamos y saldos</p>
                <h2>Deudas registradas</h2>
            </div>
            <a class="button button-primary" th:href="@{/debts/new}">Nueva deuda</a>
        </section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger alert-dismissible" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="table-panel">
            <table>
                <thead>
                <tr>
                    <th>Trabajador</th>
                    <th>Monto original</th>
                    <th>Saldo actual</th>
                    <th>Abono sugerido</th>
                    <th>Estado</th>
                    <th>Registro</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(debts)}">
                    <td colspan="7" class="empty-cell">No hay deudas registradas.</td>
                </tr>
                <tr th:each="debt : ${debts}">
                    <td><strong th:text="${debt.worker.fullName}">Trabajador</strong><span class="table-subtext" th:text="${debt.worker.position}">Puesto</span></td>
                    <td th:text="${'$' + #numbers.formatDecimal(debt.originalAmount, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${'$' + #numbers.formatDecimal(debt.currentBalance, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${'$' + #numbers.formatDecimal(debt.suggestedPayment, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td><span class="status-pill" th:classappend="${' debt-' + debt.status}" th:text="${debt.status.name() == 'ACTIVE' ? 'Activa' : (debt.status.name() == 'PAID' ? 'Liquidada' : 'Cancelada')}">Activa</span></td>
                    <td th:text="${#temporals.format(debt.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                    <td class="actions-cell">
                        <a class="button button-secondary" th:href="@{/debts/{id}(id=${debt.id})}">Ver</a>
                        <a class="button button-secondary" th:if="${debt.status.name() == 'ACTIVE'}" th:href="@{/debts/{id}/edit(id=${debt.id})}">Editar</a>
                        <a class="button button-primary" th:if="${debt.status.name() == 'ACTIVE'}" th:href="@{/debts/{id}/payments/new(id=${debt.id})}">Abono</a>
                        <form th:if="${debt.status.name() == 'ACTIVE'}" th:action="@{/debts/{id}/cancel(id=${debt.id})}" method="post" data-debt-confirm="cancelar">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-warning">Cancelar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/debts.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar abono | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Registrar abono'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro"><div><p class="section-kicker">Deudas</p><h2 th:text="${debt.worker.fullName}">Trabajador</h2></div></section>
        <section class="detail-panel">
            <dl class="detail-grid">
                <div><dt>Trabajador</dt><dd th:text="${debt.worker.fullName}">Trabajador</dd></div>
                <div><dt>Saldo actual</dt><dd th:text="${'$' + #numbers.formatDecimal(debt.currentBalance, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Estado</dt><dd th:text="${debt.status.name() == 'ACTIVE' ? 'Activa' : (debt.status.name() == 'PAID' ? 'Liquidada' : 'Cancelada')}">Activa</dd></div>
            </dl>
        </section>
        <form th:action="@{/debts/{id}/payments(id=${debt.id})}" th:object="${debtPaymentForm}" method="post" class="form-panel form-panel-spaced" data-debt-confirm="registrar abono">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-grid">
                <div class="form-group">
                    <label for="amount">Monto</label>
                    <input id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}">
                    <span class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span>
                </div>
                <div class="form-group">
                    <label for="paymentDate">Fecha de pago</label>
                    <input id="paymentDate" type="date" th:field="*{paymentDate}">
                    <span class="field-error" th:if="${#fields.hasErrors('paymentDate')}" th:errors="*{paymentDate}"></span>
                </div>
                <div class="form-group form-group-wide">
                    <label for="notes">Notas</label>
                    <textarea id="notes" rows="4" th:field="*{notes}"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></span>
                </div>
            </div>
            <div class="form-actions">
                <a class="button button-secondary" th:href="@{/debts/{id}(id=${debt.id})}">Cancelar</a>
                <button type="submit" class="button button-primary">Guardar abono</button>
            </div>
        </form>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/debts.js}"></script>
</body>
</html>

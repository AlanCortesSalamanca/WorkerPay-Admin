<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de pago | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Detalle de pago'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro"><div><p class="section-kicker">Pagos</p><h2 th:text="${payment.worker.fullName}">Trabajador</h2></div><a class="button button-secondary" th:href="@{/payroll}">Volver</a></section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger alert-dismissible" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="detail-panel">
            <div class="worker-summary">
                <span class="worker-avatar" th:text="${#strings.substring(payment.worker.fullName,0,1)}">T</span>
                <div><h3 th:text="${payment.worker.fullName}">Nombre</h3><p th:text="${payment.period.name}">Periodo</p></div>
                <span class="status-pill" th:classappend="${' payroll-' + payment.status}" th:text="${payment.status.name() == 'PENDING' ? 'Pendiente' : (payment.status.name() == 'PAID' ? 'Pagado' : 'Cancelado')}">Pendiente</span>
            </div>
            <dl class="detail-grid">
                <div><dt>Trabajador</dt><dd th:text="${payment.worker.fullName}">Trabajador</dd></div>
                <div><dt>Periodo</dt><dd th:text="${payment.period.name}">Periodo</dd></div>
                <div><dt>Sueldo base</dt><dd th:text="${'$' + #numbers.formatDecimal(payment.baseAmount, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Bonos</dt><dd th:text="${'$' + #numbers.formatDecimal(payment.bonuses, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Adelantos</dt><dd th:text="${'$' + #numbers.formatDecimal(payment.advanceDiscount, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Deuda</dt><dd th:text="${'$' + #numbers.formatDecimal(payment.debtDiscount, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Otros descuentos</dt><dd th:text="${'$' + #numbers.formatDecimal(payment.otherDiscounts, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Pago neto</dt><dd th:text="${'$' + #numbers.formatDecimal(payment.netPayment, 1, 'COMMA', 2, 'POINT')}">$0.00</dd></div>
                <div><dt>Estado</dt><dd th:text="${payment.status.name() == 'PENDING' ? 'Pendiente' : (payment.status.name() == 'PAID' ? 'Pagado' : 'Cancelado')}">Pendiente</dd></div>
                <div><dt>Fecha de pago</dt><dd th:text="${payment.paymentDate}">2026-01-01</dd></div>
                <div><dt>Creacion</dt><dd th:text="${#temporals.format(payment.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</dd></div>
                <div><dt>Ultima actualizacion</dt><dd th:text="${#temporals.format(payment.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</dd></div>
            </dl>
            <div class="form-actions" th:if="${payment.status.name() == 'PENDING'}">
                <a class="button button-secondary" th:href="@{/payroll/{id}/edit(id=${payment.id})}">Editar</a>
                <form th:action="@{/payroll/{id}/cancel(id=${payment.id})}" method="post" data-payroll-confirm="cancelar pago">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="button button-warning">Cancelar</button>
                </form>
                <form th:action="@{/payroll/{id}/mark-paid(id=${payment.id})}" method="post" data-payroll-confirm="marcar pago como pagado">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="button button-primary">Marcar como pagado</button>
                </form>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/payroll.js}"></script>
</body>
</html>

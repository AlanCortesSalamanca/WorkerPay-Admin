<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/tables.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Pagos'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro"><div><p class="section-kicker">Nomina</p><h2>Pagos registrados</h2></div><a class="button button-primary" th:href="@{/payroll/new}">Nuevo pago</a></section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger alert-dismissible" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="table-panel">
            <table>
                <thead><tr><th>Trabajador</th><th>Periodo</th><th>Sueldo</th><th>Bonos</th><th>Adelantos</th><th>Deuda</th><th>Otros</th><th>Neto</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr></thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(payments)}"><td colspan="11" class="empty-cell">No hay pagos registrados.</td></tr>
                <tr th:each="payment : ${payments}">
                    <td><strong th:text="${payment.worker.fullName}">Trabajador</strong><span class="table-subtext" th:text="${payment.worker.position}">Puesto</span></td>
                    <td th:text="${payment.period.name}">Periodo</td>
                    <td th:text="${'$' + #numbers.formatDecimal(payment.baseAmount, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${'$' + #numbers.formatDecimal(payment.bonuses, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${'$' + #numbers.formatDecimal(payment.advanceDiscount, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${'$' + #numbers.formatDecimal(payment.debtDiscount, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td th:text="${'$' + #numbers.formatDecimal(payment.otherDiscounts, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td><strong th:text="${'$' + #numbers.formatDecimal(payment.netPayment, 1, 'COMMA', 2, 'POINT')}">$0.00</strong></td>
                    <td><span class="status-pill" th:classappend="${' payroll-' + payment.status}" th:text="${payment.status.name() == 'PENDING' ? 'Pendiente' : (payment.status.name() == 'PAID' ? 'Pagado' : 'Cancelado')}">Pendiente</span></td>
                    <td th:text="${payment.paymentDate}">2026-01-01</td>
                    <td class="actions-cell">
                        <a class="button button-secondary" th:href="@{/payroll/{id}(id=${payment.id})}">Ver</a>
                        <a class="button button-secondary" th:if="${payment.status.name() == 'PENDING'}" th:href="@{/payroll/{id}/edit(id=${payment.id})}">Editar</a>
                        <form th:if="${payment.status.name() == 'PENDING'}" th:action="@{/payroll/{id}/cancel(id=${payment.id})}" method="post" data-payroll-confirm="cancelar pago">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-warning">Cancelar</button>
                        </form>
                        <form th:if="${payment.status.name() == 'PENDING'}" th:action="@{/payroll/{id}/mark-paid(id=${payment.id})}" method="post" data-payroll-confirm="marcar pago como pagado">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-primary">Pagado</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/payroll.js}"></script>
</body>
</html>

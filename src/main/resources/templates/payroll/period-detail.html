<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de periodo | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Detalle de periodo'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro"><div><p class="section-kicker">Periodos</p><h2 th:text="${period.name}">Periodo</h2></div><a class="button button-secondary" th:href="@{/payment-periods}">Volver</a></section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger alert-dismissible" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="detail-panel">
            <dl class="detail-grid">
                <div><dt>Nombre</dt><dd th:text="${period.name}">Periodo</dd></div>
                <div><dt>Estado</dt><dd th:text="${period.status.name() == 'OPEN' ? 'Abierto' : 'Cerrado'}">Abierto</dd></div>
                <div><dt>Fecha inicio</dt><dd th:text="${period.startDate}">2026-01-01</dd></div>
                <div><dt>Fecha fin</dt><dd th:text="${period.endDate}">2026-01-15</dd></div>
                <div><dt>Creacion</dt><dd th:text="${#temporals.format(period.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</dd></div>
                <div><dt>Ultima actualizacion</dt><dd th:text="${#temporals.format(period.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</dd></div>
            </dl>
            <div class="form-actions" th:if="${period.status.name() == 'OPEN'}">
                <a class="button button-secondary" th:href="@{/payment-periods/{id}/edit(id=${period.id})}">Editar</a>
                <form th:action="@{/payment-periods/{id}/close(id=${period.id})}" method="post" data-payroll-confirm="cerrar periodo">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="button button-warning">Cerrar periodo</button>
                </form>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/payroll.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' | WorkerPay Admin'">Periodo | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle=${formTitle}" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro"><div><p class="section-kicker">Periodos</p><h2 th:text="${formTitle}">Formulario</h2></div></section>
        <form th:action="@{${formAction}}" th:object="${paymentPeriodForm}" method="post" class="form-panel">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}"></div>
            <div class="form-grid">
                <div class="form-group form-group-wide">
                    <label for="name">Nombre</label>
                    <input id="name" type="text" th:field="*{name}">
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                <div class="form-group">
                    <label for="startDate">Fecha inicio</label>
                    <input id="startDate" type="date" th:field="*{startDate}">
                    <span class="field-error" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></span>
                </div>
                <div class="form-group">
                    <label for="endDate">Fecha fin</label>
                    <input id="endDate" type="date" th:field="*{endDate}">
                    <span class="field-error" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></span>
                </div>
            </div>
            <div class="form-actions">
                <a class="button button-secondary" th:href="@{/payment-periods}">Cancelar</a>
                <button type="submit" class="button button-primary">Guardar</button>
            </div>
        </form>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/payroll.js}"></script>
</body>
</html>

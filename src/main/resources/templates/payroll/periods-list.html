<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodos | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/tables.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Periodos'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro"><div><p class="section-kicker">Nomina</p><h2>Periodos de pago</h2></div><a class="button button-primary" th:href="@{/payment-periods/new}">Nuevo periodo</a></section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger alert-dismissible" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="table-panel">
            <table>
                <thead><tr><th>Nombre</th><th>Inicio</th><th>Fin</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(periods)}"><td colspan="5" class="empty-cell">No hay periodos registrados.</td></tr>
                <tr th:each="period : ${periods}">
                    <td><strong th:text="${period.name}">Periodo</strong></td>
                    <td th:text="${period.startDate}">2026-01-01</td>
                    <td th:text="${period.endDate}">2026-01-15</td>
                    <td><span class="status-pill" th:classappend="${' period-' + period.status}" th:text="${period.status.name() == 'OPEN' ? 'Abierto' : 'Cerrado'}">Abierto</span></td>
                    <td class="actions-cell">
                        <a class="button button-secondary" th:href="@{/payment-periods/{id}(id=${period.id})}">Ver</a>
                        <a class="button button-secondary" th:if="${period.status.name() == 'OPEN'}" th:href="@{/payment-periods/{id}/edit(id=${period.id})}">Editar</a>
                        <form th:if="${period.status.name() == 'OPEN'}" th:action="@{/payment-periods/{id}/close(id=${period.id})}" method="post" data-payroll-confirm="cerrar periodo">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-warning">Cerrar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/payroll.js}"></script>
</body>
</html>

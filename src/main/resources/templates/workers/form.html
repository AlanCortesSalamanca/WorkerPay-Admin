<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' | WorkerPay Admin'">Trabajador | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle=${formTitle}" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro">
            <div>
                <p class="section-kicker">Trabajadores</p>
                <h2 th:text="${formTitle}">Formulario</h2>
            </div>
        </section>
        <form th:action="@{${formAction}}" th:object="${workerForm}" method="post" class="form-panel">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-grid">
                <div class="form-group">
                    <label for="fullName">Nombre completo</label>
                    <input id="fullName" type="text" th:field="*{fullName}">
                    <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                </div>
                <div class="form-group">
                    <label for="phone">Telefono</label>
                    <input id="phone" type="text" th:field="*{phone}">
                </div>
                <div class="form-group">
                    <label for="position">Puesto</label>
                    <input id="position" type="text" th:field="*{position}">
                    <span class="field-error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></span>
                </div>
                <div class="form-group">
                    <label for="paymentType">Tipo de pago</label>
                    <select id="paymentType" th:field="*{paymentType}">
                        <option value="">Selecciona una opcion</option>
                        <option th:each="type : ${paymentTypes}" th:value="${type}" th:text="${type}">WEEKLY</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('paymentType')}" th:errors="*{paymentType}"></span>
                </div>
                <div class="form-group">
                    <label for="baseSalary">Salario base</label>
                    <input id="baseSalary" type="number" step="0.01" min="0" th:field="*{baseSalary}">
                    <span class="field-error" th:if="${#fields.hasErrors('baseSalary')}" th:errors="*{baseSalary}"></span>
                </div>
                <div class="form-group">
                    <label for="hireDate">Fecha de ingreso</label>
                    <input id="hireDate" type="date" th:field="*{hireDate}">
                    <span class="field-error" th:if="${#fields.hasErrors('hireDate')}" th:errors="*{hireDate}"></span>
                </div>
                <label class="checkbox-field">
                    <input type="checkbox" th:field="*{active}">
                    <span>Trabajador activo</span>
                </label>
            </div>
            <div class="form-actions">
                <a class="button button-secondary" th:href="@{/workers}">Cancelar</a>
                <button type="submit" class="button button-primary">Guardar</button>
            </div>
        </form>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/workers.js}"></script>
</body>
</html>

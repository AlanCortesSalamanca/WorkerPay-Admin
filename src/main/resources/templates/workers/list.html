<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajadores | WorkerPay Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/tables.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <main class="content-shell">
        <div th:with="pageTitle='Trabajadores'" th:replace="~{layout/navbar :: navbar}"></div>
        <section class="page-intro">
            <div>
                <p class="section-kicker">Gestion de personal</p>
                <h2>Directorio de trabajadores</h2>
            </div>
            <a class="button button-primary" th:href="@{/workers/new}">Nuevo trabajador</a>
        </section>
        <div class="alert alert-success alert-dismissible" th:if="${successMessage}" th:text="${successMessage}"></div>
        <section class="table-panel">
            <table>
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Puesto</th>
                    <th>Tipo de pago</th>
                    <th>Sueldo base</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(workers)}">
                    <td colspan="6" class="empty-cell">No hay trabajadores registrados.</td>
                </tr>
                <tr th:each="worker : ${workers}">
                    <td th:text="${worker.fullName}">Nombre</td>
                    <td th:text="${worker.position}">Puesto</td>
                    <td>
                        <span class="status-pill payment-pill" th:classappend="${' payment-' + worker.paymentType}" th:text="${worker.paymentType}">WEEKLY</span>
                    </td>
                    <td th:text="${'$' + #numbers.formatDecimal(worker.baseSalary, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    <td>
                        <span class="status-pill" th:classappend="${worker.active} ? ' status-active' : ' status-muted'" th:text="${worker.active} ? 'Activo' : 'Inactivo'">Activo</span>
                    </td>
                    <td class="actions-cell">
                        <a class="button button-secondary" th:href="@{/workers/{id}(id=${worker.id})}">Ver</a>
                        <a class="button button-secondary" th:href="@{/workers/{id}/edit(id=${worker.id})}">Editar</a>
                        <form th:if="${worker.active}" th:action="@{/workers/{id}/deactivate(id=${worker.id})}" method="post" data-confirm-action="desactivar">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-warning">Desactivar</button>
                        </form>
                        <form th:unless="${worker.active}" th:action="@{/workers/{id}/activate(id=${worker.id})}" method="post" data-confirm-action="activar">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="button button-primary">Activar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/workers.js}"></script>
</body>
</html>
